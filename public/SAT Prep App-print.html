<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SAT Prep — Print</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --accent: #CC5800;
    --accent-ink: #A04400;
    --accent-brand: #FF7E2E;
    --accent-soft: #FFF0E6;
    --accent-border: #FFD4B0;

    --orange: #FF7E2E;
    --orange-ink: #CC5800;
    --orange-soft: #FFF0E6;
    --orange-border: #FFD4B0;

    --bg: #F0FAFA;
    --surface: #FFFFFF;
    --surface-2: #F6FFFF;
    --ink: #0D1E1E;
    --ink-2: #2A3E3E;
    --ink-3: #5A7272;
    --ink-4: #8AACAC;
    --border: #C8E4E4;
    --border-2: #DCF0F0;

    --ok: #3F7A5E;
    --ok-soft: #E8F0EA;
    --warn: #B85C00;
    --warn-soft: #FFF0E6;
    --bad: #B5181D;
    --bad-soft: #FDEAEA;
    --info: #1480B8;
    --info-soft: #E6F5FD;

    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;

    --shadow-sm: 0 1px 0 rgba(20,20,20,.03), 0 1px 2px rgba(20,20,20,.04);
    --shadow: 0 1px 0 rgba(20,20,20,.03), 0 4px 14px -6px rgba(20,20,20,.08);
    --shadow-lg: 0 1px 0 rgba(20,20,20,.03), 0 18px 40px -18px rgba(20,20,20,.18);

    --serif: "Fraunces", ui-serif, Georgia, serif;
    --sans: "DM Sans", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01","cv11";
  }
  button{font-family:inherit;color:inherit}
  h1,h2,h3,h4{margin:0;font-family:var(--serif); font-weight:500; letter-spacing:-0.01em; color:var(--ink)}
  h1{font-size:34px; line-height:1.1; letter-spacing:-0.02em}
  h2{font-size:24px; line-height:1.2}
  h3{font-size:19px; line-height:1.25}
  p{margin:0}
  .num{font-variant-numeric: tabular-nums}

  /* Shell */
  .app{
    display:grid;
    grid-template-columns: 248px 1fr;
    min-height: 100vh;
  }
  .sidebar{
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 22px 16px;
    display:flex; flex-direction:column; gap:6px;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    padding: 6px 10px 18px 10px;
  }
  .brand-sub{font-size:11px; color:var(--ink-4); margin-top:1px; letter-spacing:0.02em}
  .side-label{
    font-size:11px; text-transform:uppercase; letter-spacing:0.08em;
    color: var(--ink-4); padding: 14px 10px 6px 10px; font-weight:500;
  }
  .side-item{
    display:flex; align-items:center; gap:11px;
    padding: 9px 10px; border-radius: 8px;
    color: var(--ink-2); font-size: 14px; font-weight:450;
    border:none; background:transparent; width:100%; text-align:left;
  }
  .side-item.active{
    background: var(--accent-soft); color: var(--accent-ink); font-weight:500;
  }
  .side-item svg{width:17px; height:17px; stroke-width:1.7; color: var(--ink-3)}
  .side-item.active svg{color: var(--accent-ink)}
  .side-foot{
    margin-top:auto;
    border-top:1px solid var(--border);
    padding-top:12px;
  }
  .side-user{
    display:flex; align-items:center; gap:10px; padding: 8px 10px; border-radius:8px;
  }
  .avatar{
    width:30px; height:30px; border-radius:50%;
    background: #E8E6DE; color:var(--ink-2);
    display:grid; place-items:center; font-size:12px; font-weight:500;
  }

  .main{ min-width:0; display:flex; flex-direction:column }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 36px;
    border-bottom: 1px solid var(--border);
    background: color-mix(in srgb, var(--bg) 80%, transparent);
  }
  .crumbs{ display:flex; align-items:center; gap:8px; color:var(--ink-3); font-size:13px}
  .crumbs strong{ color:var(--ink); font-weight:500 }
  .top-actions{ display:flex; align-items:center; gap:10px }
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    padding: 5px 10px; border-radius: 999px;
    background: var(--surface); border:1px solid var(--border);
    font-size: 12.5px; color:var(--ink-2);
  }
  .chip .dot{width:6px; height:6px; border-radius:50%; background:var(--accent)}
  .screen{ padding: 36px 48px 80px 48px; max-width: 1280px; width:100%; margin: 0 auto }

  /* Atoms */
  .btn{
    display:inline-flex; align-items:center; gap:8px;
    padding: 10px 16px; border-radius: 8px; font-size:14px; font-weight:500;
    border:1px solid transparent; cursor:pointer; font-family: var(--sans);
  }
  .btn-primary{ background: var(--accent); color:#fff }
  .btn-ghost{ background: transparent; color: var(--ink-2); border-color: var(--border) }
  .btn-quiet{ background: transparent; color: var(--ink-2); border-color: transparent }
  .btn-lg{ padding: 13px 20px; font-size: 15px }
  .btn svg{ width:15px; height:15px; stroke-width:1.9 }

  .card{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
  }
  .tag{
    display:inline-flex; align-items:center; gap:6px;
    padding: 4px 9px; border-radius:999px;
    font-size:12px; color:var(--ink-2);
    background: var(--surface-2); border:1px solid var(--border);
  }
  .tag-strong{ background: var(--accent-soft); border-color: var(--accent-border); color: var(--accent-ink) }
  .tag-ok{ background: var(--ok-soft); border-color: color-mix(in srgb, var(--ok) 25%, white); color: var(--ok) }
  .tag-warn{ background: var(--warn-soft); border-color: color-mix(in srgb, var(--warn) 25%, white); color: var(--warn) }
  .tag-bad{ background: var(--bad-soft); border-color: color-mix(in srgb, var(--bad) 25%, white); color: var(--bad) }
  .divider{ height:1px; background: var(--border); width:100% }

  input[type="text"], input[type="number"], input[type="search"], select, textarea{
    font-family: var(--sans); font-size:14px; color:var(--ink);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px;
    outline: none;
  }

  .seg{ display:inline-flex; background: var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:2px }
  .seg button{ padding:5px 10px; font-size:12.5px; border:none; background:transparent; border-radius:6px; cursor:pointer; color:var(--ink-3) }
  .seg button.on{ background: var(--surface); color:var(--ink); box-shadow: var(--shadow-sm) }

  .row{display:flex; align-items:center; gap:12px}
  .col{display:flex; flex-direction:column; gap:12px}
  .between{justify-content:space-between}
  .muted{color:var(--ink-3)}
  .small{font-size:12.5px}
  .mono{font-family: var(--mono)}
  .hide{display:none !important}

  .grid-2{ display:grid; grid-template-columns: 2fr 1fr; gap:24px }
  .grid-3{ display:grid; grid-template-columns: repeat(3, 1fr); gap:16px }
  .grid-4{ display:grid; grid-template-columns: repeat(4, 1fr); gap:16px }

  .stat{ padding: 20px 22px; }
  .stat .label{ font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-4); font-weight:500 }
  .stat .value{ font-family:var(--serif); font-size:38px; font-weight:500; letter-spacing:-0.02em; margin-top:6px; line-height:1 }
  .stat .sub{ font-size:13px; color: var(--ink-3); margin-top:6px }

  .pbar{ height:4px; background: var(--border-2); border-radius: 2px; overflow:hidden }
  .pbar > span{ display:block; height:100%; background: var(--accent); border-radius: 2px }

  .qshell{ background: var(--surface); border-radius: 16px; border:1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden; }
  .qtop{ display:flex; align-items:center; justify-content:space-between; padding: 14px 22px; border-bottom: 1px solid var(--border); }
  .qsteps{ display:flex; gap:3px; flex:1; max-width: 560px; margin: 0 24px }
  .qstep{ height:4px; flex:1; background: var(--border-2); border-radius:2px }
  .qstep.done{ background: var(--accent) }
  .qstep.cur{ background: var(--ink) }
  .qbody{ display:grid; grid-template-columns: 1.15fr 1fr; min-height: 520px }
  .qleft{ padding: 32px 36px; border-right:1px solid var(--border) }
  .qright{ padding: 32px 36px; display:flex; flex-direction:column; gap:10px }
  .qpassage{ font-size:15.5px; line-height:1.65; color: var(--ink-2) }
  .qpassage strong{ color: var(--ink); font-weight:500 }
  .qprompt{ font-family: var(--serif); font-size: 20px; line-height:1.35; margin-top: 22px; color: var(--ink) }
  .choice{ display:flex; align-items:flex-start; gap:14px; padding: 14px 16px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); }
  .choice.selected{ border-color: var(--accent); background: var(--accent-soft) }
  .choice .key{ width:26px; height:26px; border-radius:50%; border:1px solid var(--border); display:grid; place-items:center; font-size:13px; font-weight:500; color: var(--ink-2); flex-shrink:0; background: var(--surface); }
  .choice.selected .key{ background: var(--accent); color:#fff; border-color: var(--accent) }
  .choice .ctext{ font-size: 14.5px; color: var(--ink); line-height:1.5 }
  .qbottom{ display:flex; align-items:center; justify-content:space-between; padding: 14px 22px; border-top:1px solid var(--border); background: var(--surface-2); }

  table{ width:100%; border-collapse: collapse; font-size:13.5px }
  thead th{ text-align:left; font-weight:500; color:var(--ink-3); font-size:12px; text-transform:uppercase; letter-spacing:0.06em; padding: 12px 18px; border-bottom:1px solid var(--border); background: var(--surface-2); }
  tbody td{ padding: 14px 18px; border-bottom:1px solid var(--border-2); vertical-align: middle }
  tbody tr:last-child td{ border-bottom: none }
  .icon-btn{ width:28px; height:28px; border-radius:7px; border:1px solid transparent; background: transparent; color: var(--ink-3); display:inline-grid; place-items:center; }
  .icon-btn svg{ width:15px; height:15px; stroke-width:1.8 }

  .optcard{ padding: 18px; border:1px solid var(--border); border-radius: 12px; background: var(--surface); }
  .optcard.selected{ border-color: var(--accent); background: var(--accent-soft) }
  .optcard h4{ font-family: var(--serif); font-size:17px; margin-bottom:4px }
  .optcard p{ font-size: 13px; color: var(--ink-3) }
  .optcard .ok{ float:right; width:18px; height:18px; border-radius:50%; border:1.5px solid var(--border); background: var(--surface); }
  .optcard.selected .ok{ border-color: var(--accent); background: var(--accent); background-image: radial-gradient(circle at center, #fff 30%, transparent 32%); }

  .stepper{ display:inline-flex; align-items:center; border:1px solid var(--border); border-radius: 10px; background: var(--surface) }
  .stepper button{ width:38px; height:38px; background: transparent; border:none; color: var(--ink-2); font-size:18px }
  .stepper .val{ width:60px; text-align:center; font-family: var(--serif); font-size:22px; font-weight:500; letter-spacing:-0.01em }

  .qrow{ display:grid; grid-template-columns: 36px 1fr auto auto; gap: 16px; align-items:center; padding: 14px 18px; border-bottom:1px solid var(--border-2); }
  .qrow:last-child{ border-bottom:none }
  .qrow .ind{ width: 30px; height:30px; border-radius: 8px; display:grid; place-items:center; font-size:13px; font-weight:500; background: var(--ok-soft); color: var(--ok); }
  .qrow.bad .ind{ background: var(--bad-soft); color: var(--bad) }
  .qrow .qtxt{ font-size:14px; color: var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
  .qrow .qsub{ font-size:12px; color:var(--ink-3); margin-top:2px }
  .qrow .caret{ color: var(--ink-4) }
  .explain{ padding: 20px 28px 22px 82px; background: var(--surface-2); border-bottom:1px solid var(--border-2); font-size: 14px; color: var(--ink-2); line-height:1.6; }
  .explain h5{ font-family: var(--serif); font-size: 15px; margin:0 0 6px 0; color: var(--ink); font-weight:500 }
  .explain .aibadge{ display:inline-flex; align-items:center; gap:6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent-ink); background: var(--accent-soft); padding: 3px 8px; border-radius: 999px; font-weight:500; margin-bottom: 8px; border: 1px solid var(--accent-border); }

  .qcard{ padding: 22px 24px; }
  .qcard .meta{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; color: var(--ink-3); font-size: 12.5px; }
  .qcard .qtext{ font-family: var(--serif); font-size: 18px; line-height:1.4; color: var(--ink); margin-bottom: 14px; }
  .qcard .answers{ display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom: 16px }
  .ans{ display:flex; gap:10px; padding:10px 12px; border:1px solid var(--border-2); border-radius:8px; font-size: 13px; color: var(--ink-2); }
  .ans.correct{ border-color: color-mix(in srgb, var(--ok) 35%, white); background: var(--ok-soft); color: var(--ok) }
  .ans .k{ font-weight:500; color: var(--ink-3); width:16px }
  .ans.correct .k{ color: var(--ok) }
  .qcard-actions{ display:flex; gap:8px; justify-content:flex-end; align-items:center }

  .view{ animation: none !important }

  .donut{ width: 160px; height: 160px; position: relative; }
  .donut .lbl{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .donut .big{ font-family: var(--serif); font-size: 44px; font-weight:500; letter-spacing:-0.02em }
  .donut .small{ color: var(--ink-3); font-size: 12px; margin-top:2px }

  /* ── Print layout ── */
  .print-page {
    display: grid;
    grid-template-columns: 248px 1fr;
    width: 100%;
    min-height: 100vh;
    background: var(--bg);
    break-after: page;
    break-inside: avoid;
    overflow: hidden;
  }
  .print-page .sidebar {
    position: static;
    height: auto;
    min-height: 100vh;
  }
  .print-page-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-4);
    padding: 6px 36px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
  }

  @media print {
    @page { size: landscape; margin: 0; }
    body { background: white; }
    .print-page { min-height: 100vh; page-break-after: always; break-after: page; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="student.jsx"></script>
<script type="text/babel" src="booster.jsx"></script>
<script type="text/babel" src="admin.jsx"></script>
<script type="text/babel" src="generate.jsx"></script>

<script type="text/babel">
const noop = () => {};

/* ── Sidebar snapshot ── */
function PrintSidebar({ role, activeScreen }) {
  const studentItems = [
    { id: 'dashboard', label: 'Dashboard',   icon: <IHome /> },
    { id: 'setup',     label: 'New session', icon: <IPlus /> },
    { id: 'question',  label: 'In session',  icon: <IBook /> },
    { id: 'results',   label: 'Results',     icon: <IChart /> },
  ];
  const adminItems = [
    { id: 'bank',     label: 'Question bank', icon: <IBook /> },
    { id: 'generate', label: 'AI Generate',   icon: <ISpark /> },
    { id: 'review',   label: 'AI Review',     icon: <ICheck /> },
    { id: 'students', label: 'Students',      icon: <IUsers /> },
    { id: 'settings', label: 'Settings',      icon: <ISettings /> },
  ];
  const items = role === 'admin' ? adminItems : studentItems;

  return (
    <aside className="sidebar">
      <div className="brand">
        <div style={{ width: 36, height: 36, borderRadius: 8, background: '#E8E8E8',
          border: '1.5px dashed #BDBDBD', flexShrink: 0 }}></div>
        <div>
          <div style={{ fontSize: 15, fontWeight: 600, letterSpacing: '-0.01em',
            color: '#C0C0C0', fontFamily: 'system-ui', fontStyle: 'italic' }}>
            App name
          </div>
          <div className="brand-sub">{role === 'student' ? 'Student' : 'Admin'} workspace</div>
        </div>
      </div>
      <div className="side-label">{role === 'student' ? 'Student' : 'Admin'}</div>
      {items.map(i => (
        <div key={i.id} className={"side-item" + (i.id === activeScreen ? ' active' : '')}>
          {i.icon}<span>{i.label}</span>
        </div>
      ))}
      <div className="side-foot">
        <div className="side-user">
          <div className="avatar">LN</div>
          <div>
            <div style={{ fontSize: 13, fontWeight: 500 }}>Linh Nguyễn</div>
            <div className="small muted">{role === 'student' ? 'Student' : 'Administrator'}</div>
          </div>
        </div>
      </div>
    </aside>
  );
}

/* ── Single print page ── */
function PrintPage({ role, screen, label, children }) {
  return (
    <div className="print-page">
      <PrintSidebar role={role} activeScreen={screen} />
      <div className="main">
        <div className="print-page-label">{label}</div>
        {children}
      </div>
    </div>
  );
}

/* ── Root ── */
function PrintRoot() {
  return (
    <React.Fragment>
      <PrintPage role="student" screen="dashboard" label="Student · Dashboard">
        <StudentDashboard go={noop} />
      </PrintPage>

      <PrintPage role="student" screen="setup" label="Student · New session">
        <SessionSetup go={noop} />
      </PrintPage>

      <PrintPage role="student" screen="question" label="Student · In session">
        <QuestionScreen go={noop} />
      </PrintPage>

      <PrintPage role="student" screen="results" label="Student · Results">
        <ResultsScreen go={noop} lowScore={false} startBooster={noop} />
      </PrintPage>

      <PrintPage role="student" screen="results" label="Student · Results (low score / booster prompt)">
        <ResultsScreen go={noop} lowScore={true} startBooster={noop} />
      </PrintPage>

      <PrintPage role="student" screen="booster" label="Student · Adaptive booster">
        <AdaptiveBooster go={noop} finish={noop} />
      </PrintPage>

      <PrintPage role="admin" screen="bank" label="Admin · Question bank">
        <AdminBank go={noop} />
      </PrintPage>

      <PrintPage role="admin" screen="generate" label="Admin · AI Generate">
        <AdminGenerate go={noop} />
      </PrintPage>

      <PrintPage role="admin" screen="review" label="Admin · AI Review">
        <AdminReview go={noop} />
      </PrintPage>
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<PrintRoot />);

// Auto-print after fonts + Babel + render settle
document.fonts.ready.then(() => {
  setTimeout(() => { window.print(); }, 500);
});
</script>

</body>
</html>
