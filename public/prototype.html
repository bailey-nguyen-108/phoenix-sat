<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SAT Prep — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --accent: #2F4F6F;        /* deep slate-blue */
    --accent-ink: #1E3350;    /* darker hover */
    --accent-soft: #EEF2F6;   /* tinted surface */
    --accent-border: #D6DFE8;

    --bg: #F7F6F3;            /* warm off-white */
    --surface: #FFFFFF;
    --surface-2: #FBFAF7;
    --ink: #1A1A1A;
    --ink-2: #404040;
    --ink-3: #6B6B6B;
    --ink-4: #9A9A95;
    --border: #E8E6E0;
    --border-2: #EFEDE7;

    --ok: #3F7A5E;
    --ok-soft: #E8F0EA;
    --warn: #A0691C;
    --warn-soft: #F5EEDE;
    --bad: #A5443A;
    --bad-soft: #F3E5E1;

    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;

    --shadow-sm: 0 1px 0 rgba(20,20,20,.03), 0 1px 2px rgba(20,20,20,.04);
    --shadow: 0 1px 0 rgba(20,20,20,.03), 0 4px 14px -6px rgba(20,20,20,.08);
    --shadow-lg: 0 1px 0 rgba(20,20,20,.03), 0 18px 40px -18px rgba(20,20,20,.18);

    --serif: "Fraunces", ui-serif, Georgia, serif;
    --sans: "DM Sans", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01","cv11";
  }
  button{font-family:inherit;color:inherit}
  h1,h2,h3,h4{margin:0;font-family:var(--serif); font-weight:500; letter-spacing:-0.01em; color:var(--ink)}
  h1{font-size:34px; line-height:1.1; letter-spacing:-0.02em}
  h2{font-size:24px; line-height:1.2}
  h3{font-size:19px; line-height:1.25}
  p{margin:0}
  .num{font-variant-numeric: tabular-nums}

  /* ------------ Shell ------------ */
  .app{
    display:grid;
    grid-template-columns: 248px 1fr;
    min-height: 100vh;
  }
  .sidebar{
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 22px 16px;
    position: sticky; top:0; height:100vh;
    display:flex; flex-direction:column; gap:6px;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    padding: 6px 10px 18px 10px;
  }
  .brand-mark{
    width:28px; height:28px; border-radius:7px;
    background: var(--accent);
    color: #fff; display:grid; place-items:center;
    font-family: var(--serif); font-weight:600; font-size:15px;
    letter-spacing:-0.02em;
  }
  .brand-name{font-family:var(--serif); font-size:17px; font-weight:500; letter-spacing:-0.01em}
  .brand-sub{font-size:11px; color:var(--ink-4); margin-top:1px; letter-spacing:0.02em}

  .side-label{
    font-size:11px; text-transform:uppercase; letter-spacing:0.08em;
    color: var(--ink-4); padding: 14px 10px 6px 10px; font-weight:500;
  }
  .side-item{
    display:flex; align-items:center; gap:11px;
    padding: 9px 10px; border-radius: 8px;
    color: var(--ink-2); font-size: 14px; font-weight:450;
    cursor:pointer; border:none; background:transparent; width:100%; text-align:left;
    transition: background .12s ease, color .12s ease;
  }
  .side-item:hover{background: var(--surface-2); color: var(--ink)}
  .side-item.active{
    background: var(--accent-soft); color: var(--accent-ink); font-weight:500;
  }
  .side-item svg{width:17px; height:17px; stroke-width:1.7; color: var(--ink-3)}
  .side-item.active svg{color: var(--accent-ink)}

  .side-foot{
    margin-top:auto;
    border-top:1px solid var(--border);
    padding-top:12px;
  }
  .side-user{
    display:flex; align-items:center; gap:10px; padding: 8px 10px; border-radius:8px;
  }
  .avatar{
    width:30px; height:30px; border-radius:50%;
    background: #E8E6DE; color:var(--ink-2);
    display:grid; place-items:center; font-size:12px; font-weight:500;
  }

  /* Main area */
  .main{ min-width:0; display:flex; flex-direction:column }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 36px;
    border-bottom: 1px solid var(--border);
    background: color-mix(in srgb, var(--bg) 80%, transparent);
    backdrop-filter: blur(6px);
    position: sticky; top:0; z-index:10;
  }
  .crumbs{ display:flex; align-items:center; gap:8px; color:var(--ink-3); font-size:13px}
  .crumbs strong{ color:var(--ink); font-weight:500 }
  .top-actions{ display:flex; align-items:center; gap:10px }
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    padding: 5px 10px; border-radius: 999px;
    background: var(--surface); border:1px solid var(--border);
    font-size: 12.5px; color:var(--ink-2);
  }
  .chip .dot{width:6px; height:6px; border-radius:50%; background:var(--accent)}

  .screen{ padding: 36px 48px 80px 48px; max-width: 1280px; width:100%; margin: 0 auto }

  /* ------------ Atoms ------------ */
  .btn{
    display:inline-flex; align-items:center; gap:8px;
    padding: 10px 16px; border-radius: 8px; font-size:14px; font-weight:500;
    border:1px solid transparent; cursor:pointer;
    transition: background .14s ease, border-color .14s ease, transform .08s ease;
    font-family: var(--sans);
  }
  .btn:active{ transform: translateY(0.5px) }
  .btn-primary{ background: var(--accent); color:#fff }
  .btn-primary:hover{ background: var(--accent-ink) }
  .btn-ghost{ background: transparent; color: var(--ink-2); border-color: var(--border) }
  .btn-ghost:hover{ background: var(--surface); color: var(--ink) }
  .btn-quiet{ background: transparent; color: var(--ink-2); border-color: transparent }
  .btn-quiet:hover{ background: var(--surface-2); color: var(--ink) }
  .btn-lg{ padding: 13px 20px; font-size: 15px }
  .btn svg{ width:15px; height:15px; stroke-width:1.9 }

  .card{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
  }
  .card-hov{ transition: box-shadow .18s ease, transform .18s ease }
  .card-hov:hover{ box-shadow: var(--shadow); transform: translateY(-1px) }

  .tag{
    display:inline-flex; align-items:center; gap:6px;
    padding: 4px 9px; border-radius:999px;
    font-size:12px; color:var(--ink-2);
    background: var(--surface-2); border:1px solid var(--border);
  }
  .tag-strong{ background: var(--accent-soft); border-color: var(--accent-border); color: var(--accent-ink) }
  .tag-ok{ background: var(--ok-soft); border-color: color-mix(in srgb, var(--ok) 25%, white); color: var(--ok) }
  .tag-warn{ background: var(--warn-soft); border-color: color-mix(in srgb, var(--warn) 25%, white); color: var(--warn) }
  .tag-bad{ background: var(--bad-soft); border-color: color-mix(in srgb, var(--bad) 25%, white); color: var(--bad) }

  .divider{ height:1px; background: var(--border); width:100% }

  input[type="text"], input[type="number"], input[type="search"], select, textarea{
    font-family: var(--sans); font-size:14px; color:var(--ink);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px;
    outline: none;
    transition: border-color .14s ease, box-shadow .14s ease;
  }
  input:focus, select:focus, textarea:focus{
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent);
  }

  /* ------------ Tweaks panel ------------ */
  .tweaks{
    position: fixed; right: 20px; bottom: 20px; z-index: 50;
    background: var(--surface); border:1px solid var(--border);
    border-radius: 14px; box-shadow: var(--shadow-lg);
    padding: 14px; width: 280px;
    display: none;
  }
  .tweaks.on{ display:block }
  .tweaks h4{ font-family: var(--serif); font-size:15px; margin-bottom:10px }
  .tweak-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding: 6px 0 }
  .tweak-row label{ font-size:13px; color:var(--ink-2) }
  .swatches{ display:flex; gap:6px }
  .sw{ width:20px; height:20px; border-radius:50%; border:1px solid var(--border); cursor:pointer }
  .sw.active{ outline: 2px solid var(--ink); outline-offset:2px }
  .seg{ display:inline-flex; background: var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:2px }
  .seg button{ padding:5px 10px; font-size:12.5px; border:none; background:transparent; border-radius:6px; cursor:pointer; color:var(--ink-3) }
  .seg button.on{ background: var(--surface); color:var(--ink); box-shadow: var(--shadow-sm) }

  /* Utility */
  .row{display:flex; align-items:center; gap:12px}
  .col{display:flex; flex-direction:column; gap:12px}
  .between{justify-content:space-between}
  .muted{color:var(--ink-3)}
  .small{font-size:12.5px}
  .mono{font-family: var(--mono)}
  .hide{display:none !important}

  /* Screen-specific shared bits */
  .grid-2{ display:grid; grid-template-columns: 2fr 1fr; gap:24px }
  .grid-3{ display:grid; grid-template-columns: repeat(3, 1fr); gap:16px }
  .grid-4{ display:grid; grid-template-columns: repeat(4, 1fr); gap:16px }

  .stat{
    padding: 20px 22px;
  }
  .stat .label{ font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-4); font-weight:500 }
  .stat .value{ font-family:var(--serif); font-size:38px; font-weight:500; letter-spacing:-0.02em; margin-top:6px; line-height:1 }
  .stat .sub{ font-size:13px; color: var(--ink-3); margin-top:6px }

  /* Progress bars */
  .pbar{ height:4px; background: var(--border-2); border-radius: 2px; overflow:hidden }
  .pbar > span{ display:block; height:100%; background: var(--accent); border-radius: 2px }

  /* Question screen */
  .qshell{
    background: var(--surface); border-radius: 16px; border:1px solid var(--border);
    box-shadow: var(--shadow-sm); overflow: hidden;
  }
  .qtop{
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 22px; border-bottom: 1px solid var(--border);
  }
  .qsteps{ display:flex; gap:3px; flex:1; max-width: 560px; margin: 0 24px }
  .qstep{ height:4px; flex:1; background: var(--border-2); border-radius:2px }
  .qstep.done{ background: var(--accent) }
  .qstep.cur{ background: var(--ink) }

  .qbody{ display:grid; grid-template-columns: 1.15fr 1fr; min-height: 520px }
  .qleft{ padding: 32px 36px; border-right:1px solid var(--border) }
  .qright{ padding: 32px 36px; display:flex; flex-direction:column; gap:10px }

  .qpassage{ font-size:15.5px; line-height:1.65; color: var(--ink-2) }
  .qpassage strong{ color: var(--ink); font-weight:500 }
  .qprompt{ font-family: var(--serif); font-size: 20px; line-height:1.35; margin-top: 22px; color: var(--ink) }

  .choice{
    display:flex; align-items:flex-start; gap:14px;
    padding: 14px 16px;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface); cursor:pointer;
    transition: border-color .14s ease, background .14s ease;
  }
  .choice:hover{ border-color: #C9C5BB }
  .choice.selected{ border-color: var(--accent); background: var(--accent-soft) }
  .choice .key{
    width:26px; height:26px; border-radius:50%;
    border:1px solid var(--border); display:grid; place-items:center;
    font-size:13px; font-weight:500; color: var(--ink-2); flex-shrink:0;
    background: var(--surface);
  }
  .choice.selected .key{ background: var(--accent); color:#fff; border-color: var(--accent) }
  .choice .ctext{ font-size: 14.5px; color: var(--ink); line-height:1.5 }

  .qbottom{
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 22px; border-top:1px solid var(--border);
    background: var(--surface-2);
  }

  /* Table */
  table{ width:100%; border-collapse: collapse; font-size:13.5px }
  thead th{
    text-align:left; font-weight:500; color:var(--ink-3);
    font-size:12px; text-transform:uppercase; letter-spacing:0.06em;
    padding: 12px 18px; border-bottom:1px solid var(--border);
    background: var(--surface-2);
  }
  tbody td{ padding: 14px 18px; border-bottom:1px solid var(--border-2); vertical-align: middle }
  tbody tr:last-child td{ border-bottom: none }
  tbody tr:hover{ background: var(--surface-2) }
  .icon-btn{
    width:28px; height:28px; border-radius:7px; border:1px solid transparent;
    background: transparent; color: var(--ink-3); display:inline-grid; place-items:center;
    cursor: pointer; transition: background .12s ease, color .12s ease;
  }
  .icon-btn:hover{ background: var(--surface-2); color: var(--ink) }
  .icon-btn svg{ width:15px; height:15px; stroke-width:1.8 }

  /* Radio-card (session setup) */
  .optcard{
    padding: 18px; border:1px solid var(--border); border-radius: 12px;
    background: var(--surface); cursor:pointer;
    transition: border-color .14s ease, background .14s ease;
  }
  .optcard:hover{ border-color: #CFCCC3 }
  .optcard.selected{ border-color: var(--accent); background: var(--accent-soft) }
  .optcard h4{ font-family: var(--serif); font-size:17px; margin-bottom:4px }
  .optcard p{ font-size: 13px; color: var(--ink-3) }
  .optcard .ok{
    float:right; width:18px; height:18px; border-radius:50%;
    border:1.5px solid var(--border); background: var(--surface);
  }
  .optcard.selected .ok{
    border-color: var(--accent); background: var(--accent);
    background-image: radial-gradient(circle at center, #fff 30%, transparent 32%);
  }

  /* Step counter */
  .stepper{ display:inline-flex; align-items:center; border:1px solid var(--border); border-radius: 10px; background: var(--surface) }
  .stepper button{ width:38px; height:38px; background: transparent; border:none; cursor:pointer; color: var(--ink-2); font-size:18px }
  .stepper button:hover{ color: var(--ink) }
  .stepper .val{ width:60px; text-align:center; font-family: var(--serif); font-size:22px; font-weight:500; letter-spacing:-0.01em }

  /* Result row */
  .qrow{
    display:grid; grid-template-columns: 36px 1fr auto auto; gap: 16px; align-items:center;
    padding: 14px 18px; border-bottom:1px solid var(--border-2); cursor:pointer;
  }
  .qrow:last-child{ border-bottom:none }
  .qrow:hover{ background: var(--surface-2) }
  .qrow .ind{
    width: 30px; height:30px; border-radius: 8px;
    display:grid; place-items:center; font-size:13px; font-weight:500;
    background: var(--ok-soft); color: var(--ok);
  }
  .qrow.bad .ind{ background: var(--bad-soft); color: var(--bad) }
  .qrow .qtxt{ font-size:14px; color: var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
  .qrow .qsub{ font-size:12px; color:var(--ink-3); margin-top:2px }
  .qrow .caret{ color: var(--ink-4); transition: transform .2s ease }
  .qrow.open .caret{ transform: rotate(90deg) }
  .explain{
    padding: 20px 28px 22px 82px; background: var(--surface-2); border-bottom:1px solid var(--border-2);
    font-size: 14px; color: var(--ink-2); line-height:1.6;
  }
  .explain h5{ font-family: var(--serif); font-size: 15px; margin:0 0 6px 0; color: var(--ink); font-weight:500 }
  .explain .aibadge{
    display:inline-flex; align-items:center; gap:6px;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--accent-ink); background: var(--accent-soft);
    padding: 3px 8px; border-radius: 999px; font-weight:500; margin-bottom: 8px;
    border: 1px solid var(--accent-border);
  }

  /* AI review card */
  .qcard{
    padding: 22px 24px;
  }
  .qcard .meta{
    display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;
    color: var(--ink-3); font-size: 12.5px;
  }
  .qcard .qtext{
    font-family: var(--serif); font-size: 18px; line-height:1.4; color: var(--ink); margin-bottom: 14px;
  }
  .qcard .answers{ display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom: 16px }
  .ans{
    display:flex; gap:10px; padding:10px 12px; border:1px solid var(--border-2);
    border-radius:8px; font-size: 13px; color: var(--ink-2);
  }
  .ans.correct{ border-color: color-mix(in srgb, var(--ok) 35%, white); background: var(--ok-soft); color: var(--ok) }
  .ans .k{ font-weight:500; color: var(--ink-3); width:16px }
  .ans.correct .k{ color: var(--ok) }

  .qcard-actions{ display:flex; gap:8px; justify-content:flex-end; align-items:center }

  /* Animated fade for view switching */
  .view{ animation: fadeup .3s ease both }
  @keyframes fadeup{ from{ opacity:0; transform: translateY(4px)} to{ opacity:1; transform:none } }

  /* Score donut */
  .donut{
    width: 160px; height: 160px; position: relative;
  }
  .donut .lbl{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .donut .big{ font-family: var(--serif); font-size: 44px; font-weight:500; letter-spacing:-0.02em }
  .donut .small{ color: var(--ink-3); font-size: 12px; margin-top:2px }
</style>
</head>
<body>
<div id="root"></div>

<script type="application/json" id="tweak-defaults">
{
  "accent": "slate-blue",
  "density": "comfortable",
  "studentName": "Linh Nguyễn"
}
</script>
